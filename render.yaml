services:
  - type: cron
    name: naukri-auto-apply-bot
    env: docker
    region: oregon
    # 2:30 AM UTC is 8:00 AM IST. This triggers the job at 8:00 AM IST daily.
    schedule: "30 2 * * *"
    # Recommend the starter plan (or higher) to avoid Out-Of-Memory issues with headless Chromium.
    plan: starter
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set securely in Render Dashboard
      - key: NAUKRI_USERNAME
        sync: false
      - key: NAUKRI_PASSWORD
        sync: false
      - key: OPENAI_API_KEY # Optional, if you use OpenAI as fallback
        sync: false
      - key: MAX_APPLICATIONS
        value: "20"
