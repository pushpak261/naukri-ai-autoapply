name: Naukri Profile Refresh Cron

on:
  schedule:
    # Runs at 01:30 UTC every day (7:00 AM IST)
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  refresh-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
          
      - name: Decrypt Secrets (Session)
        env:
          RESUME_KEY: ${{ secrets.RESUME_KEY }}
        run: |
          python -c "
          from cryptography.fernet import Fernet
          import os, json
          from pathlib import Path
          cipher = Fernet(os.environ['RESUME_KEY'].encode())
          if Path('session.enc').exists():
              print('session.enc found, size:', Path('session.enc').stat().st_size)
              Path('data/sessions').mkdir(parents=True, exist_ok=True)
              try:
                  decrypted = cipher.decrypt(Path('session.enc').read_bytes())
                  print('Decryption succeeded, size:', len(decrypted))
                  json.loads(decrypted)
                  print('Decrypted content is valid JSON')
                  Path('data/sessions/naukri_session.json').write_bytes(decrypted)
                  print('Session file written successfully')
              except Exception as e:
                  print('DECRYPT/VALIDATION FAILED:', repr(e))
                  raise
          else:
              print('session.enc NOT FOUND in checkout')
          "
          
      - name: Run Naukri Profile Refresh
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          xvfb-run python -m src.naukri_agent.main refresh-profile

      - name: Encrypt and Commit Session
        env:
          RESUME_KEY: ${{ secrets.RESUME_KEY }}
        run: |
          python -c "
          from cryptography.fernet import Fernet
          import os
          from pathlib import Path
          session_file = Path('data/sessions/naukri_session.json')
          if session_file.exists() and os.environ.get('RESUME_KEY'):
              cipher = Fernet(os.environ['RESUME_KEY'].encode())
              encrypted_data = cipher.encrypt(session_file.read_bytes())
              Path('session.enc').write_bytes(encrypted_data)
              print('Session encrypted successfully.')
          else:
              print('No session file found or RESUME_KEY missing.')
          "
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "session.enc" ] && ! git diff --quiet session.enc; then
            cp session.enc temp_session.enc
            git fetch origin main
            git checkout --force -B main origin/main
            mv temp_session.enc session.enc
            git add session.enc
            git commit -m "Auto-update session cookies [skip ci]"
            git push origin main
          else
            echo "No session changes detected."
          fi