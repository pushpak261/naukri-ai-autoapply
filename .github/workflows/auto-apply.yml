name: Naukri Auto Apply Cron

on:
  schedule:
    # Runs at 8:00 AM, 10:00 AM, 12:00 PM, 6:00 PM, and 8:00 PM IST
    - cron: '30 2,4,6,12,14 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Bot Database (State)
        uses: actions/cache@v4
        with:
          path: data/
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Install OCR dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
          
      - name: Decrypt Secrets (Resume & Session)
        env:
          RESUME_KEY: ${{ secrets.RESUME_KEY }}
        run: |
          pip install cryptography
          python -c "
          from cryptography.fernet import Fernet
          import os
          from pathlib import Path
          cipher = Fernet(os.environ['RESUME_KEY'].encode())
          Path('resume.pdf').write_bytes(cipher.decrypt(Path('resume.pdf.enc').read_bytes()))
          if Path('resume_profile.json.enc').exists():
              Path('resume_profile.json').write_bytes(cipher.decrypt(Path('resume_profile.json.enc').read_bytes()))
          if Path('session.enc').exists():
              Path('data/sessions').mkdir(parents=True, exist_ok=True)
              Path('data/sessions/naukri_session.json').write_bytes(cipher.decrypt(Path('session.enc').read_bytes()))
          "
          
      - name: Run Naukri Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          xvfb-run python -m src.main run

      - name: Encrypt and Commit Session
        env:
          RESUME_KEY: ${{ secrets.RESUME_KEY }}
        run: |
          python -c "
          from cryptography.fernet import Fernet
          import os
          from pathlib import Path
          session_file = Path('data/sessions/naukri_session.json')
          if session_file.exists() and os.environ.get('RESUME_KEY'):
              cipher = Fernet(os.environ['RESUME_KEY'].encode())
              encrypted_data = cipher.encrypt(session_file.read_bytes())
              Path('session.enc').write_bytes(encrypted_data)
              print('Session encrypted successfully.')
          else:
              print('No session file found or RESUME_KEY missing.')
          "
          git config --global user.name \"github-actions[bot]\"
          git config --global user.email \"github-actions[bot]@users.noreply.github.com\"
          if [ -f "session.enc" ] && ! git diff --quiet session.enc; then
            git add session.enc
            git commit -m "Auto-update session cookies [skip ci]"
            git push
          else
            echo "No session changes detected."
          fi