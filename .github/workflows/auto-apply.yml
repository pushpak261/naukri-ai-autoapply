name: Naukri Auto Apply Cron

on:
  schedule:
    # Runs at 02:30 UTC every day (8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
          
      - name: Decrypt Resume
        env:
          RESUME_KEY: ${{ secrets.RESUME_DECRYPTION_KEY }}
        run: |
          pip install cryptography
          python -c "import os; from cryptography.fernet import Fernet; cipher = Fernet(os.environ['RESUME_KEY'].encode('utf-8')); decrypted = cipher.decrypt(open('resume.pdf.enc', 'rb').read()); open('resume.pdf', 'wb').write(decrypted)"
          
          
      - name: Run Naukri Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          python -m src.main run
