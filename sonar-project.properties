# SonarCloud organization and project keys
sonar.organization=pushpak261
sonar.projectKey=YOUR_PROJECT_KEY_HERE
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=Naukri AI Auto Apply Agent
sonar.projectVersion=1.0

# Comma-separated paths to directories with sources
sonar.sources=src
sonar.language=py
sonar.sourceEncoding=UTF-8

# Comma-separated paths to directories with tests
sonar.tests=tests

# Test execution and coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclude some files or directories from analysis
sonar.exclusions=**/__init__.py, **/*_test.py, tests/**, scripts/**, **/*.md, **/*.json, **/*.yaml, **/*.txt, data/**, debug_artifacts/**
