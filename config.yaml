# =============================================================================
# Naukri.com AI Agent Configuration
# =============================================================================
# Copy this file and fill in your details. Sensitive values (email, password,
# API keys) can also be set via environment variables or a .env file.

# ---------------------------------------------------------------------------
# Naukri.com Credentials
# ---------------------------------------------------------------------------
naukri:
  email: ""          # Override with NAUKRI_EMAIL env var
  password: ""       # Override with NAUKRI_PASSWORD env var

# ---------------------------------------------------------------------------
# Google Gemini AI Settings
# ---------------------------------------------------------------------------
ai:
  gemini_api_key: "" # Override with GEMINI_API_KEY env var
  model: "gemini-2.0-flash"
  fallback_model: "gemini-1.5-flash"  # Optional secondary model when primary model hits daily 429 quota
  abort_on_quota: true  # If true, stops the run on daily quota error when no fallback model is set
  temperature: 0.3
  max_output_tokens: 4096

# ---------------------------------------------------------------------------
# Resume
# ---------------------------------------------------------------------------
resume:
  path: "resume.pdf"           # Path to your PDF resume (e.g., "C:/Users/you/resume.pdf")

# ---------------------------------------------------------------------------
# Job Search Parameters
# ---------------------------------------------------------------------------
search:
  keywords:
    - "Full Stack Developer"
    - "Java Developer"
    # - "Associate Software Engineer"
    # - "Junior Software Engineer"
    # - "Backend Developer"
    # - "Software Engineer"
    # - "Software Developer"
  locations:
    - "Pune"
    - "Mumbai"
    - "Bangalore"
    - "Remote"
  experience_min: 0        # Minimum years of experience filter
  experience_max: 1        # Maximum years of experience filter
  salary_min: 0            # Minimum salary in LPA (0 = any)
  freshness: 3             # Job posting age in days (1, 3, 7, 15, 30)
  max_pages: 5             # Max search result pages to scan per keyword
  sort_by: "relevance"     # "relevance" or "date"

# ---------------------------------------------------------------------------
# Application Controls
# ---------------------------------------------------------------------------
application:
  daily_cap: 30                   # Max applications per day
  match_score_threshold: 20       # Minimum AI match score (0-100) to auto-apply
  delay_between_applies_min: 30   # Minimum delay in seconds between applications
  delay_between_applies_max: 90   # Maximum delay in seconds between applications
  delay_between_actions_min: 1.0  # Minimum delay between browser actions (seconds)
  delay_between_actions_max: 3.0  # Maximum delay between browser actions (seconds)
  skip_external_apply: true       # Skip jobs that redirect to external websites
  dry_run: false                  # If true, score jobs but don't actually apply

# ---------------------------------------------------------------------------
# Personal Details (for auto-filling application forms)
# ---------------------------------------------------------------------------
profile:
  current_ctc: "4.4 LPA"          # e.g., "8.5 LPA" or "850000"
  expected_ctc: "6 LPA"         # e.g., "12 LPA" or "1200000"
  notice_period: "Immediate"        # e.g., "30 days", "60 days", "Immediate"
  current_location: "Pune"     # e.g., "Bangalore"
  preferred_locations:
    - "Pune"
    - "Mumbai"
    - "Bangalore"
    - "Remote"
  total_experience: "1 years"     # e.g., "4 years"

# ---------------------------------------------------------------------------
# Exclusion Filters
# ---------------------------------------------------------------------------
exclusions:
  companies: []            # Companies to skip (e.g., ["Company A", "Company B"])
  title_keywords:          # Skip jobs with these words in title (e.g., ["intern", "junior"])
    - "support"
    - "testing"
    - "qa"
    - "sales"
    - "marketing"
    - "bpo"
    - "customer"
    - "tech support"
  description_keywords: [] # Skip jobs with these words in description

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_dir: "data/logs"
